<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Chain Explorer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1e1e2e; color: #cdd6f4; margin: 0; padding: 2rem; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #89b4fa; border-bottom: 2px solid #313244; padding-bottom: 10px; }
        .dashboard { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background-color: #313244; padding: 20px; border-radius: 8px; flex: 1; text-align: center; }
        .card h2 { margin: 0 0 10px 0; font-size: 1.2rem; color: #a6adc8; }
        .card .value { font-size: 2.5rem; font-weight: bold; color: #a6e3a1; }
        .search-box { background-color: #313244; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        input[type="text"], select { padding: 10px; border: 1px solid #45475a; border-radius: 4px; background-color: #1e1e2e; color: #cdd6f4; font-family: monospace; }
        input[type="text"] { width: 65%; }
        button { padding: 10px 20px; background-color: #89b4fa; color: #11111b; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .result { margin-top: 15px; display: none; }
        .section { background-color: #181825; padding: 15px; border-radius: 6px; margin-top: 10px; font-family: monospace; }
        .badge { background-color: #cba6f7; color: #11111b; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; margin-right: 10px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js"></script>
</head>
<body>

<div class="container">
    <h1>⛓️ Enterprise Chain Explorer</h1>
    
    <div style="margin-bottom: 20px;">
        <label>Node: </label>
        <select id="nodeUrl">
            <option value="http://localhost:8080">Bootnode (Port 8080)</option>
            <option value="http://104.199.234.94:8080">Cloud Node 2 (Port 8080)</option>
        </select>
    </div>
    <div>
        <label>Corporate API Key: </label>
<input type="password" id="apiKey" placeholder="Enter secret key..."
style="padding: 10px; background: #1e1e2e; color: white; border: 1px solid #45475a; margin-bottom: 20px;">

    <div class="dashboard">
        <div class="card"><h2>Block Height</h2><div class="value" id="blockHeight">--</div></div>
        <div class="card"><h2>Mempool</h2><div class="value" id="mempoolCount">--</div></div>
    </div>

    <div class="search-box" style="border: 1px solid #89b4fa;">
        <h2>💸 Digital Wallet (Broadcast Transaction)</h2>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="walletPrivKey" placeholder="Your Private Key (Hex)" style="width: 100%;">
            <input type="text" id="destAddr" placeholder="Recipient Address (Hex)" style="width: 100%;">
            
            <div style="display: flex; gap: 10px;">
                <input type="number" id="sendAmount" placeholder="Amount" style="width: 50%;">
                <input type="text" id="contractData" placeholder='Optional JSON (e.g., {"method":"SetRecord"...})' style="width: 50%;">
            </div>
            
            <button onclick="sendTransaction()" style="background-color: #89b4fa; width: 100%; margin-top: 10px;">Sign & Send to Mempool</button>
            <div id="txStatus" style="margin-top: 15px; font-family: monospace; font-size: 0.9rem;"></div>
        </div>
        
        <div class="search-box" style="border: 1px solid #cba6f7; margin-top: 20px;">
            <h2>📝 Smart Contract (CMMS / Registry)</h2>
            <p style="color: #a6adc8; font-size: 0.9rem; margin-top: 0;">Execute the SetRecord chaincode to permanently store data.</p>
        
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="contractPrivKey" placeholder="Your Private Key (Hex)" style="width: 100%;">
                <input type="text" id="contractAddr" placeholder="Contract Address (e.g., 9999999999999999999999999999999999999999)" value="9999999999999999999999999999999999999999" style="width: 100%;">
                
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="recordKey" placeholder="Record Key (e.g., asset:pump_01_status)" style="width: 50%;">
                    <input type="text" id="recordValue" placeholder="Record Value (e.g., Repaired on April 3)" style="width: 50%;">
                </div>
                
                <button onclick="executeContract()" style="background-color: #cba6f7; width: 100%; margin-top: 10px;">Deploy to Blockchain</button>
                <div id="contractStatus" style="margin-top: 15px; font-family: monospace; font-size: 0.9rem;"></div>
            </div>
        </div>
    </div>

    <div class="search-box">
        <h2>Inspect Account / Smart Contract</h2>
        <input type="text" id="addressInput" placeholder="Enter hex address...">
        <button onclick="checkAccount()">Inspect</button>
        
        <div class="result" id="accountResult">
            <div class="section" id="accOverview"></div>
            <h3>Smart Contract Memory</h3>
            <div class="section" id="accStorage"></div>
            <h3>Transaction History</h3>
            <div class="section" id="accHistory"></div>
        </div>
    </div>
</div>

<script>
    async function fetchNetworkStatus() {
        const nodeUrl = document.getElementById('nodeUrl').value;
        try {
            const res = await fetch(`${nodeUrl}/status`);
            if (res.ok) {
                const data = await res.json();
                document.getElementById('blockHeight').innerText = data.height;
                document.getElementById('mempoolCount').innerText = data.pending_txs;
            }
        } catch (e) {}
    }

    async function checkAccount() {
        const nodeUrl = document.getElementById('nodeUrl').value;
        const address = document.getElementById('addressInput').value;
        const resultDiv = document.getElementById('accountResult');
        
        if (!address) return;
        resultDiv.style.display = 'block';

        try {
            const res = await fetch(`${nodeUrl}/account?address=${address}`);
            if (res.ok) {
                const data = await res.json();
                
                // 1. Overview
                document.getElementById('accOverview').innerHTML = 
                    `<strong>Balance:</strong> ${data.balance} tokens<br><strong>Nonce:</strong> ${data.nonce}`;
                
                // 2. Storage
                let storageHtml = "";
                if (data.storage && Object.keys(data.storage).length > 0) {
                    for (const [key, value] of Object.entries(data.storage)) {
                        storageHtml += `<span class="badge">KEY</span> <strong>${key}</strong> = ${value}<br>`;
                    }
                } else {
                    storageHtml = "<i>No smart contract data stored.</i>";
                }
                document.getElementById('accStorage').innerHTML = storageHtml;

                // 3. History
                let histHtml = "";
                if (data.history && data.history.length > 0) {
                    data.history.forEach(tx => {
                        let color = tx.startsWith("IN") ? "#a6e3a1" : "#f38ba8";
                        histHtml += `<span style="color:${color}">${tx}</span><br>`;
                    });
                } else {
                    histHtml = "<i>No transactions found.</i>";
                }
                document.getElementById('accHistory').innerHTML = histHtml;

            } else {
                document.getElementById('accOverview').innerHTML = "Account not found or empty.";
                document.getElementById('accStorage').innerHTML = "";
                document.getElementById('accHistory').innerHTML = "";
            }
        } catch (error) {
            document.getElementById('accOverview').innerHTML = "Network error.";
        }
    }

    setInterval(fetchNetworkStatus, 2000);
    fetchNetworkStatus();

    
</script>

<script>
    const ec = new elliptic.ec('p256');

    // Helper functions to replicate Go's binary byte arrays
    function hexToBytes(hex) {
        let bytes = [];
        for (let c = 0; c < hex.length; c += 2) bytes.push(parseInt(hex.substr(c, 2), 16));
        return bytes;
    }

    function intToBigEndianBytes(num, byteCount) {
        let bytes = new Uint8Array(byteCount);
        new DataView(bytes.buffer).setBigUint64(0, BigInt(num), false);
        return Array.from(bytes);
    }

    function amountToBytes(amountStr) {
        if (amountStr === "0" || amountStr === "") return [];
        let hex = BigInt(amountStr).toString(16);
        if (hex.length % 2 !== 0) hex = '0' + hex;
        return hexToBytes(hex);
    }

    async function sendTransaction() {
        const nodeUrl = document.getElementById('nodeUrl').value;
        const privKeyHex = document.getElementById('walletPrivKey').value;
        const toAddr = document.getElementById('destAddr').value;
        const amount = document.getElementById('sendAmount').value || "0";
        const dataStr = document.getElementById('contractData').value || "";
        const statusDiv = document.getElementById('txStatus');

        try {
            statusDiv.innerText = "Fetching current nonce...";
            
            // 1. Derive sender address from private key
            const key = ec.keyFromPrivate(privKeyHex);
            const pubKey = key.getPublic();
            const pubKeyHex = pubKey.getX().toString(16, 64);
            const senderAddr = pubKeyHex.slice(-40); // Last 20 bytes
            
            // 2. Fetch Nonce from the selected node
            const accRes = await fetch(`${nodeUrl}/account?address=${senderAddr}`);
            let nonce = 0;
            if (accRes.ok) {
                const accData = await accRes.json();
                nonce = accData.nonce || 0;
            }

           

            // 3. Build the Payload exactly like Go does
            let payloadBytes = [];
            payloadBytes.push(...hexToBytes(senderAddr));
            payloadBytes.push(...hexToBytes(toAddr));
            payloadBytes.push(...amountToBytes(amount));
            payloadBytes.push(...intToBigEndianBytes(nonce, 8));
            if (dataStr.length > 0) {
                payloadBytes.push(...new TextEncoder().encode(dataStr));
            }

            // 4. Sign the payload using P-256
            const msgHash = await crypto.subtle.digest('SHA-256', new Uint8Array(payloadBytes));
            const signature = key.sign(Array.from(new Uint8Array(msgHash)));
            const sigBytes = Array.from(signature.toDER());

            // 5. Construct the JSON Request
            // Note: Go's []byte expects Base64 encoded strings in JSON
            const tx = {
                sender: hexToBytes(senderAddr),    // <--- CHANGED: Convert Hex string to Byte Array
                recipient: hexToBytes(toAddr),
                amount: parseInt(amount),
                nonce: nonce,
                data: btoa(dataStr), // Base64 encode the contract data
                signature: btoa(String.fromCharCode.apply(null, sigBytes))
            };

            

            // 6. Broadcast to the API
            statusDiv.innerText = "Broadcasting to mempool...";
            // --- NEW: Grab the API Key from the UI ---
            const apiKey = document.getElementById('apiKey').value;

            const response = await fetch(`${nodeUrl}/tx`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-KEY': apiKey 
                },
                body: JSON.stringify(tx)
            });


            if (response.ok) {
                statusDiv.innerHTML = `<span style="color: #a6e3a1;">✅ Success! Transaction accepted into mempool with Nonce ${nonce}</span>`;
            } else {
                const err = await response.text();
                statusDiv.innerHTML = `<span style="color: #f38ba8;">❌ Error: ${err}</span>`;
            }
        } catch (e) {
            statusDiv.innerHTML = `<span style="color: #f38ba8;">❌ Failed: ${e.message}</span>`;
        }
    }
    async function executeContract() {
        const nodeUrl = document.getElementById('nodeUrl').value;
        const privKeyHex = document.getElementById('contractPrivKey').value;
        const contractAddr = document.getElementById('contractAddr').value;
        const keyInput = document.getElementById('recordKey').value;
        const valueInput = document.getElementById('recordValue').value;
        const statusDiv = document.getElementById('contractStatus');

        if (!privKeyHex || !keyInput || !valueInput) {
            statusDiv.innerHTML = `<span style="color: #f38ba8;">❌ Error: Please fill in all fields.</span>`;
            return;
        }

        try {
            statusDiv.innerText = "Formatting Chaincode & Fetching nonce...";
            
            // 1. Derive sender address
            const key = ec.keyFromPrivate(privKeyHex);
            const pubKeyHex = key.getPublic().getX().toString(16, 64);
            const senderAddr = pubKeyHex.slice(-40); 
            
            // 2. Fetch Nonce
            const accRes = await fetch(`${nodeUrl}/account?address=${senderAddr}`);
            let nonce = 0;
            if (accRes.ok) {
                const accData = await accRes.json();
                nonce = accData.nonce || 0;
            }

            // 3. Construct the Smart Contract JSON Payload
            const contractPayload = JSON.stringify({
                method: "SetRecord",
                key: keyInput,
                value: valueInput
            });

            // 4. Build the Payload exactly like Go does
            let payloadBytes = [];
            payloadBytes.push(...hexToBytes(senderAddr));
            payloadBytes.push(...hexToBytes(contractAddr));
            // Amount is 0 for contract calls, so we push an empty array just like amountToBytes("0")
            payloadBytes.push(...intToBigEndianBytes(nonce, 8));
            payloadBytes.push(...new TextEncoder().encode(contractPayload));

            // 5. Sign the payload using P-256
            const msgHash = await crypto.subtle.digest('SHA-256', new Uint8Array(payloadBytes));
            const signature = key.sign(Array.from(new Uint8Array(msgHash)));
            const sigBytes = Array.from(signature.toDER());

            // 6. Construct the JSON Request
            const tx = {
                sender: hexToBytes(senderAddr),
                recipient: hexToBytes(contractAddr),
                amount: 0,
                nonce: nonce,
                data: btoa(contractPayload), // Base64 encode the contract JSON
                signature: btoa(String.fromCharCode.apply(null, sigBytes))
            };

            // 7. Broadcast to the API
            statusDiv.innerText = "Broadcasting to mempool...";
            // --- NEW: Grab the API Key from the UI ---
            const apiKey = document.getElementById('apiKey').value;
            const response = await fetch(`${nodeUrl}/tx`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-KEY': apiKey 
                },
                body: JSON.stringify(tx)
            });

            if (response.ok) {
                statusDiv.innerHTML = `<span style="color: #a6e3a1;">✅ Success! Data written to blockchain.</span>`;
                // Clear the inputs for the next entry
                document.getElementById('recordKey').value = '';
                document.getElementById('recordValue').value = '';
            } else {
                const err = await response.text();
                statusDiv.innerHTML = `<span style="color: #f38ba8;">❌ Error: ${err}</span>`;
            }
        } catch (e) {
            statusDiv.innerHTML = `<span style="color: #f38ba8;">❌ Failed: ${e.message}</span>`;
        }
    }
</script>

</body>
</html>
