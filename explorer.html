<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Chain Explorer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2e; color: #cdd6f4; margin: 0; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #89b4fa; border-bottom: 2px solid #313244; padding-bottom: 10px; }
        .dashboard { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background-color: #313244; padding: 20px; border-radius: 8px; flex: 1; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h2 { margin: 0 0 10px 0; font-size: 1.2rem; color: #a6adc8; }
        .card .value { font-size: 2.5rem; font-weight: bold; color: #a6e3a1; }
        .search-box { background-color: #313244; padding: 20px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        input[type="text"] { width: 70%; padding: 10px; border: 1px solid #45475a; border-radius: 4px; background-color: #1e1e2e; color: #cdd6f4; font-family: monospace; }
        button { padding: 10px 20px; background-color: #89b4fa; color: #11111b; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #74c7ec; }
        .result { margin-top: 15px; padding: 15px; background-color: #1e1e2e; border-radius: 4px; font-family: monospace; display: none; }
        .node-selector { margin-bottom: 20px; }
        select { padding: 8px; background-color: #313244; color: #cdd6f4; border: 1px solid #45475a; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⛓️ Enterprise Chain Explorer</h1>
    
    <div class="node-selector">
        <label>Connecting to: </label>
        <select id="nodeUrl">
            <option value="http://localhost:8080">Bootnode (Port 8080)</option>
            <option value="http://localhost:8081">Node 2 (Port 8081)</option>
        </select>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>Current Block Height</h2>
            <div class="value" id="blockHeight">--</div>
        </div>
        <div class="card">
            <h2>Transactions in Mempool</h2>
            <div class="value" id="mempoolCount">--</div>
        </div>
    </div>

    <div class="search-box">
        <h2>Inspect Account</h2>
        <input type="text" id="addressInput" placeholder="Enter 40-character hex address...">
        <button onclick="checkBalance()">Check Balance</button>
        <div class="result" id="balanceResult"></div>
    </div>
</div>

<script>
    // Poll the network status every 2 seconds
    async function fetchNetworkStatus() {
        const nodeUrl = document.getElementById('nodeUrl').value;
        try {
            const res = await fetch(`${nodeUrl}/status`);
            if (res.ok) {
                const data = await res.json();
                document.getElementById('blockHeight').innerText = data.height;
                document.getElementById('mempoolCount').innerText = data.pending_txs;
            }
        } catch (error) {
            document.getElementById('blockHeight').innerText = "OFFLINE";
            document.getElementById('mempoolCount').innerText = "OFFLINE";
        }
    }

    // Query the balance endpoint
    async function checkBalance() {
        const nodeUrl = document.getElementById('nodeUrl').value;
        const address = document.getElementById('addressInput').value;
        const resultDiv = document.getElementById('balanceResult');
        
        if (!address) return;

        resultDiv.style.display = 'block';
        resultDiv.innerHTML = "Querying ledger...";

        try {
            const res = await fetch(`${nodeUrl}/balance?address=${address}`);
            if (res.ok) {
                const data = await res.json();
                resultDiv.innerHTML = `<strong>Address:</strong> ${data.address}<br><strong>Balance:</strong> ${data.balance} tokens`;
            } else {
                resultDiv.innerHTML = `<span style="color: #f38ba8;">Error fetching address data.</span>`;
            }
        } catch (error) {
            resultDiv.innerHTML = `<span style="color: #f38ba8;">Network error. Ensure the node is running.</span>`;
        }
    }

    // Start the polling loop
    setInterval(fetchNetworkStatus, 2000);
    fetchNetworkStatus();
</script>

</body>
</html>
